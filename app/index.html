<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Practice Questions</title>
<link rel="stylesheet" href="style.css?v=6">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">Practice Questions</div>
    </div>

    <div class="top-actions">
      <button id="new-session-btn" class="ghost-btn ghost-btn-accent" type="button" title="Pick which questions to drill in a new session">New session</button>
      <button id="reset-stats-btn" class="ghost-btn" type="button" title="Clear answered/wrong history for all questions">Reset progress</button>
      <button id="theme-toggle" class="ghost-btn" type="button" title="Toggle light or dark mode">Light mode</button>
    </div>
  </header>

  <section class="progress-block">
    <div class="progress-row progress-row-overall">
      <div class="progress-label">
        <span class="progress-name">Overall</span>
        <span class="progress-counts">
          <span id="overall-answered">0</span> / <span id="overall-total">0</span>
          <span class="progress-detail">
            <span class="dot dot-good"></span><span id="overall-correct">0</span> correct
            <span class="dot dot-bad"></span><span id="overall-wrong">0</span> wrong
          </span>
        </span>
      </div>
      <div class="progress-bar">
        <div class="seg seg-correct" id="overall-fill-correct"></div>
        <div class="seg seg-wrong" id="overall-fill-wrong"></div>
      </div>
    </div>

    <div class="section-grid" id="section-grid"></div>
  </section>

  <main class="stage">
    <article id="slide" class="slide" aria-live="polite">
      <div class="slide-loading">Loading questions...</div>
    </article>
  </main>

  <footer class="footer">
    <button id="back-btn" class="btn btn-tertiary" hidden>&larr; Back</button>
    <button id="clear-btn" class="btn btn-tertiary" hidden>Clear</button>
    <button id="copy-btn" class="btn btn-tertiary" hidden>Copy Question</button>
    <button id="reveal-btn" class="btn btn-primary" hidden>Reveal Answer</button>
    <button id="next-btn" class="btn btn-secondary" hidden>Next Question</button>
    <button id="restart-btn" class="btn btn-tertiary" hidden>Start New Session</button>
    <div class="footer-meta">
      <span class="kbd-hint">Press <kbd>Space</kbd> to reveal, <kbd>&rarr;</kbd> for next, <kbd>&larr;</kbd> for back, <kbd>C</kbd> for case study</span>
    </div>
  </footer>
</div>

<div id="picker-modal" class="picker-modal" hidden>
  <div class="picker-backdrop" data-picker-close></div>
  <section id="picker" class="picker" role="dialog" aria-modal="true" aria-labelledby="picker-title">
    <div class="picker-header">
      <div>
        <h2 id="picker-title" class="picker-title">New session</h2>
        <div class="picker-sub">Pick which questions to include, then start.</div>
      </div>
      <div class="picker-count">
        <strong id="picker-count">0</strong> selected of <span id="picker-bank-total">0</span>
      </div>
    </div>

    <div class="picker-presets" id="picker-presets">
      <span class="picker-presets-label">Quick picks:</span>
      <button class="chip-btn" data-preset="all" type="button">All</button>
      <button class="chip-btn" data-preset="none" type="button">None</button>
      <button class="chip-btn" data-preset="wrong" type="button">Wrong only</button>
      <button class="chip-btn" data-preset="unanswered" type="button">Unanswered</button>
      <button class="chip-btn" data-preset="correct" type="button">Correct only</button>
      <button class="chip-btn" data-preset="plan" type="button">Plan only</button>
      <button class="chip-btn" data-preset="design" type="button">Design only</button>
      <button class="chip-btn" data-preset="deploy" type="button">Deploy only</button>
      <button class="chip-btn" data-preset="case-fabrikam" type="button">Fabrikam case</button>
      <button class="chip-btn" data-preset="case-contoso" type="button">Contoso case</button>
      <button class="chip-btn" data-preset="case-none" type="button">No case study</button>
    </div>

    <div id="picker-body" class="picker-body"></div>

    <div class="picker-footer">
      <button id="picker-cancel" class="btn btn-tertiary" type="button" data-picker-close>Cancel</button>
      <button id="picker-start" class="btn btn-primary" type="button">Start session</button>
    </div>
  </section>
</div>

<div id="cs-modal" class="cs-modal" hidden>
  <div class="cs-backdrop" data-close></div>
  <div class="cs-dialog" role="dialog" aria-modal="true" aria-labelledby="cs-title">
    <div class="cs-header">
      <div id="cs-title" class="cs-title">Case Study</div>
      <button id="cs-close" class="ghost-btn" type="button" data-close>Close</button>
    </div>
    <iframe id="cs-frame" title="Case study visual" src="about:blank"></iframe>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="app.js?v=6"></script>
</body>
</html>
